<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beep Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.c{width:100%;max-width:480px;padding:24px}
h1{font-size:20px;text-align:center;margin-bottom:24px;color:#8af}
.card{background:#14141f;border:1px solid #2a2a3a;border-radius:12px;padding:20px;margin-bottom:16px;cursor:pointer;transition:all .2s}
.card:hover{border-color:#4a4a6a}
.card.active{border-color:#6a8aff;box-shadow:0 0 20px rgba(106,138,255,.15)}
.card h2{font-size:16px;margin-bottom:6px}
.card p{font-size:13px;color:#888;line-height:1.5}
.tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tag{background:#1a1a2e;padding:3px 10px;border-radius:20px;font-size:12px;color:#8af}
.sg{margin-top:16px;background:#14141f;border-radius:10px;padding:16px}
.sl{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:6px}
.sl span:last-child{color:#8af}
input[type=range]{width:100%;accent-color:#2a4aff}
.btn{width:100%;padding:16px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;background:#2a4aff;color:#fff;transition:all .2s}
.btn:hover{background:#3a5aff}
.btn.on{background:#ff3a3a}
.btn.on:hover{background:#ff5a5a}
.st{text-align:center;margin-top:12px;font-size:12px;color:#666;min-height:36px;line-height:1.5}
.viz{height:60px;background:#14141f;border-radius:10px;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:3px;overflow:hidden;padding:0 12px}
.bar{width:4px;background:#2a4aff;border-radius:2px;transition:height .05s;height:4px}
</style>
</head>
<body>
<div class="c">
  <h1>🔊 Beep Generator</h1>

  <div class="card active" data-p="A" onclick="sel('A')">
    <h2>패턴 A — 고주파 순환</h2>
    <p>200ms × 2 → 1초 휴식 → 반복<br>배경소리 속 인지율 최적화</p>
    <div class="tags"><span class="tag">500</span><span class="tag">700</span><span class="tag">900 Hz</span></div>
  </div>

  <div class="card" data-p="B" onclick="sel('B')">
    <h2>패턴 B — 저주파 순환</h2>
    <p>200ms × 2 → 2초 휴식 → 반복</p>
    <div class="tags"><span class="tag">400</span><span class="tag">600</span><span class="tag">800 Hz</span></div>
  </div>

  <div class="card" data-p="C" onclick="sel('C')">
    <h2>패턴 C — 15초 롤링</h2>
    <p>1초 비프 → 15초 간격 반복<br>이지모드 장시간 인지용</p>
    <div class="tags"><span class="tag">500</span><span class="tag">700</span><span class="tag">900 Hz</span></div>
  </div>

  <div class="sg">
    <div class="sl"><span>볼륨</span><span id="vv">50%</span></div>
    <input type="range" id="vol" min="0" max="100" value="50">
  </div>

  <div class="viz" id="viz"></div>

  <button class="btn" id="btn" onclick="toggle()">▶ 재생</button>
  <div class="st" id="st"></div>
</div>

<script>
// ═══ CONFIG ═══
const P = {
  A: { f:[500,700,900], d:200, n:2, g:200, r:1000 },
  B: { f:[400,600,800], d:200, n:2, g:200, r:2000 },
  C: { f:[500,700,900], d:1000, n:1, g:0, r:15000 }
};

let cur='A', on=false, ctx=null, vol=0.5, fi=0;
let wk=null, silAudio=null, wakeLock=null;
let cbs={}, cid=0, bars=[];

// ═══ WEB WORKER (background timer - won't throttle) ═══
const wkBlob = new Blob([`
  const T={};let N=1;
  onmessage=e=>{
    if(e.data.c==='s'){const i=N++;T[i]=setTimeout(()=>{delete T[i];postMessage(e.data.i)},e.data.m)}
    if(e.data.c==='x'){for(let k in T)clearTimeout(T[k]);for(let k in T)delete T[k]}
  }
`],{type:'application/javascript'});
wk = new Worker(URL.createObjectURL(wkBlob));
wk.onmessage = e => { if(cbs[e.data]){cbs[e.data]();delete cbs[e.data]} };

function wt(fn,ms){ const i=++cid; cbs[i]=fn; wk.postMessage({c:'s',i,m:ms}); }
function wclear(){ wk.postMessage({c:'x'}); cbs={}; }

// ═══ SILENT AUDIO KEEP-ALIVE ═══
// Creates a 1-second silent WAV and loops it to hold the audio session
function makeSilent(){
  // Generate a proper 1-second silent WAV programmatically
  const sr=44100, ch=1, bps=16, samples=sr*1;
  const dataSize=samples*ch*(bps/8);
  const buf=new ArrayBuffer(44+dataSize);
  const v=new DataView(buf);
  // RIFF header
  writeStr(v,0,'RIFF'); v.setUint32(4,36+dataSize,true); writeStr(v,8,'WAVE');
  // fmt chunk
  writeStr(v,12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,ch,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*ch*(bps/8),true); v.setUint16(32,ch*(bps/8),true);
  v.setUint16(34,bps,true);
  // data chunk (all zeros = silence)
  writeStr(v,36,'data'); v.setUint32(40,dataSize,true);
  const blob=new Blob([buf],{type:'audio/wav'});
  const a=new Audio(URL.createObjectURL(blob));
  a.loop=true; a.volume=0.01;
  return a;
}
function writeStr(v,o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}

// ═══ WAKE LOCK ═══
async function lockOn(){
  try{if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen')}catch(e){}
}
function lockOff(){if(wakeLock){wakeLock.release();wakeLock=null}}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&on){
    lockOn();
    if(ctx?.state==='suspended') ctx.resume();
  }
});

// ═══ VISUALIZER ═══
const vizEl=document.getElementById('viz');
for(let i=0;i<32;i++){const b=document.createElement('div');b.className='bar';vizEl.appendChild(b);bars.push(b);}
function flash(freq){
  const h=10+(freq/900)*40;
  bars.forEach(b=>{b.style.height=(Math.random()*h+4)+'px';b.style.background=freq>700?'#6a8aff':freq>500?'#4a6aee':'#3a5add'});
  setTimeout(()=>bars.forEach(b=>b.style.height='4px'),180);
}

// ═══ VOLUME ═══
document.getElementById('vol').addEventListener('input',function(){
  vol=this.value/100;
  document.getElementById('vv').textContent=this.value+'%';
});

// ═══ PATTERN SELECT ═══
function sel(p){
  cur=p;
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('active',c.dataset.p===p));
  if(on){stop();start();}
}

// ═══ PLAY / STOP ═══
function toggle(){on?stop():start();}

async function start(){
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  await ctx.resume();

  // silent audio hold
  if(!silAudio) silAudio=makeSilent();
  try{await silAudio.play()}catch(e){}

  await lockOn();

  on=true; fi=0;
  document.getElementById('btn').textContent='■ 정지';
  document.getElementById('btn').classList.add('on');
  document.getElementById('st').textContent='🎧 잠금화면 + 에어팟 재생 유지 중\n크롬 탭 유지 필요';
  loop();
}

function stop(){
  on=false; wclear();
  document.getElementById('btn').textContent='▶ 재생';
  document.getElementById('btn').classList.remove('on');
  document.getElementById('st').textContent='';
  bars.forEach(b=>b.style.height='4px');
  if(silAudio){silAudio.pause();silAudio.currentTime=0;}
  lockOff();
  if(ctx){ctx.close();ctx=null;}
}

// ═══ BEEP ═══
function beep(freq,dur){
  if(!ctx||ctx.state==='closed') return;
  if(ctx.state==='suspended') ctx.resume();
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type='sine'; o.frequency.value=freq;
  const t=ctx.currentTime;
  g.gain.setValueAtTime(vol,t);
  if(dur>=50){g.gain.setValueAtTime(vol,t+dur/1000-0.02);g.gain.linearRampToValueAtTime(0,t+dur/1000);}
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t+dur/1000);
  flash(freq);
}

// ═══ LOOP (Worker-timed) ═══
function loop(){
  if(!on) return;
  const p=P[cur];
  let delay=0;
  for(let i=0;i<p.n;i++){
    const freq=p.f[fi%p.f.length], d=delay;
    wt(()=>{if(on)beep(freq,p.d)},d);
    fi++; delay+=p.d+p.g;
  }
  delay=delay-p.g+p.r;
  wt(()=>loop(),delay);
}
</script>
</body>
</html>
